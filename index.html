<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css">
    <title>Tarun Fitness</title>
  </head>
  <style>
    body {
      margin: 0px;
      padding: 0px;
      background-image: url(image/gym1.jpg);
      background-size: cover;
      background-repeat:no-repeat;
      height: 100vh;
      color: white;
    }
    
    .left {
      position : absolute;
      left: 54px;
      top: 20px;
      display: inline-block;
    }
    .left img {
      width: 80px;
      
      border-radius: 50%; ;
    }
    .left div {
      text-align: center;
      font-size: 30px;
    }
    .mid {
      display: block;
      width: 44%;
      margin: 20px auto;
      
    }
    .right {
      position: absolute;
      right: 34px;
      top: 30px;
      display: inline-block;
    }
    .navbar {
      display: inline-block;
    }
    .navbar li {
      display: inline-block;
      font-size: 20px;
    }
    .navbar li a {
      
      color: white;
      text-decoration: none;
      padding: 14px; 
      position: relative;
     
    }
    .navbar li a::before{
      content:'';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      border-bottom: 2px solid rgb(227, 223, 18);
      transition: 0.4s linear;
    }
    .navbar li a:hover::before{
      width: 90%;
    }
    .navbar li a:hover
     {
      width: 90%;
      color: rgb(227, 223, 18);
    }
    .btn {
      padding: 4px 14px;
      background-color: black;
      color: white;
      border-radius: 10px;
      font-size: 18px;
    }
    .btn:hover {
      background-color: grey;
    }
    .h-text{
        max-width: 650px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        text-align: center;
    }
    .h-text span{
        font-size: 3.5em;
        color: brown;
    }
    .h-text a{
        text-decoration: none;
        background-color: indianred;
        color: white;
        padding: 10px 20px;
        letter-spacing: 5px;
        border-radius: 8px;
        font-size: 18px;
    }
    .h-text a:hover{
        border: 4px solid brown ;
        font-size: 20px;
    }
    
  </style>
  <body>
    <header class="header">
      <div class="left">
        <img src="image/gymlogo.jpg" alt="" />
        <div>Tarun Fitness</div>
      </div>
      <div class="mid">
        <ul class="navbar">
          <li><a href="#" class="active">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Fitness Calculator</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </div>
      <div class="right">
        <button class="btn">Call Us Now</button>
        <button class="btn">Email Us</button>
      </div>
    </header>
    <section class="h-text">
        <span>MY FITNESS !</span>
        <h1>STAY HEALTHY AND FIT</h1>
        <a href="#">Book Now</a>
    </section>
  </body>
</html>
